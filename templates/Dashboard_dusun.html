<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Sidebar Modern - Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- Header Sederhana -->
    <header class="header">
        <div class=" justify-content-between align-items-center">
            <div class="align-items-center gap-3">
                <div class="row align-items-center">
                    <div class="col">
                        <button class="btn-mobile-menu" type="button" data-bs-toggle="offcanvas"
                            data-bs-target="#mobileMenu">
                            <i class="bi bi-list"></i>
                        </button>
                        <h1 class="h1 col" style="font-size: 50px;">
                            SPD
                        </h1>
                    </div>
                    <div class="col-lg-8" style="margin-top:30px; border-bottom:2px solid black;">
                        <div class="dropup" style="text-align: end; margin-bottom:40px">
                            <i class="bi bi-bell"> </i>
                            <a href="#" class="text-dark text-decoration-none" data-bs-toggle="dropdown">
                                <i class="bi bi-person-circle fs-5"></i>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="{{url_for('login')}}">Logout</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </header>

    <div class="wrapper d-flex">
        <aside class="sidebar">
            <nav class="nav flex-column">
                <div class="sidebar-form">
                    <a href="{{ url_for('tambah_kk') }}" style="text-decoration: none; color:inherit;">
                        <div class="sidebar-title">
                            Tambah KK
                        </div>
                    </a>
                </div>
                <a class="nav-link" style="animation: slideright 0.5s ease-in;" href="{{ url_for('Beranda_dusun') }}">
                    <i class="bi bi-house-door"></i>
                    <span>Beranda</span>
                </a>
                <a class="nav-link" style="animation: slideright 1s ease-in;" href="{{ url_for('penduduk_dusun') }}">
                    <i class="bi bi-people"></i>
                    <span>Penduduk</span>
                </a>
            </nav>
        </aside>
        <main class="content col-lg-8">
        {% block content %}
        {% endblock %}
        </div>
        </main>


    <footer class="footer col-lg-10 justify-content-center"
        style="background-color: var(--primary-color); color:white; width:77%">
        <h5>© 2026 MyApp · Made with <i class="bi bi-heart-fill text-danger"></i></h5>
    </footer>

    <div class="offcanvas offcanvas-start offcanvas-menu" tabindex="-1" id="mobileMenu">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-semibold" style="font-size: xx-large; color:var(--primary-color)">
                SPD
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <nav class="nav flex-column">
                <a class="nav-link mb-3" href="{{ url_for('Beranda_dusun')}}">
                    <i class="bi bi-house-door"></i>
                    <span>Beranda</span>
                </a>
                <a class="nav-link mb-3" href="{{ url_for('penduduk_dusun')}}">
                    <i class="bi bi-people"></i>
                    <span>Penduduk</span>
                </a>
            </nav>
        </div>
    </div>
    {% block js %}
    {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
