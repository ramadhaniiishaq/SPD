{% extends 'Dashboard_dusun.html' %}
{% block content %}
        <div class="d-flex align-items-center justify-content-between mb-4">
        <h2 class="h4 fw-bold mb-0" style="color: var(--primary-color);">Hasil Scan  <i class="bi bi-upc-scan"></i></h2>
        <div class="d-flex align-items-center gap-4">
        </div>
    </div>
    <div class="d-flex justify-content-center">
    <div class="card-modern card mb-4" style="padding: 20px; width:80vh; height:auto;" >
        <div class="card-body" style="width:100%">
            {% if no_kk %}
        <form style="color: var(--primary-color); font-size:large; font-weight:bold" action="{{url_for('ocr_kk')}}" method="POST">
         <div class="mb-3">
        <div class="mb-3">
        <label for="kk" class="form-label">Nomor Kartu Keluarga</label>
        <input type="text" class="form-control" id="kk" name="no_kk" placeholder="Masukkan nomor kartu keluarga" value="{{ no_kk }}" >
        </div>
        <div class="mb-3">
        <label for="kepala keluarga" class="form-label">Nama Kepala Keluarga</label>
        <input type="text" class="form-control" id="kepala keluarga" name="nama" placeholder="Masukkan nama kepala keluarga" value="{{ nama }}">
        <div class="mb-3">
        <label for="dusun" class="form-label">Dusun</label>
            <select class="form-select" aria-label="Default select example" id="dusun" name="dusun">
            <option selected value="{{dusun.id}}">{{ dusun.nama if dusun else 'Pilih Dusun' }}</option>
            </select>
        </div>
        </div>
            <div class="mb-3 ">
                <label for="alamat" class="form-label">Alamat</label>
                <input type="text" class="form-control" id="alamat" name="alamat" placeholder="Masukkan alamat" value="{{ alamat }}" >
            </div>
        <div class="d-flex justify-content-end mb-3">
        <button type="submit" class="btn btn-kirim ">simpan</button>
        </div>
        </form >
        {% endif %}
        </div>
        </div>
        </div>
        </div>
        </div>
        {% endblock %}
