{% extends 'Dashboard_dusun.html' %}
{% block content %}
            <!-- form penduduk -->
        <div class="d-flex align-items-center justify-content-between mb-4">
        <h2 class="h4 fw-bold mb-0" style="color: var(--primary-color);">Tambah KK <i class="bi bi-plus-lg"></i></h2>
        <div class="d-flex align-items-center gap-4">
        </div>
    </div>
    <div class="d-flex justify-content-center">
    <div class="card-modern card mb-4" style="padding: 20px; width:80vh; height:90vh;" >
        <div class="card-body" style="width:100%">
        <form style="color: var(--primary-color); font-size:large; font-weight:bold">
        <div class="row ">
        <div class="mb-3 col">
        <label for="kk" class="form-label">Nomor Kartu Keluarga</label>
        <input type="text" class="form-control" id="kk" placeholder="Masukkan nomor kartu keluarga" >
        </div>
        <div class="mb-3 col">
        <label for="jumlah orang" class="form-label">Jumlah Orang</label>
        <input type="text" class="form-control" id="jumlah orang" placeholder="Masukkan jumlah orang" >
        </div>
        </div>
        <div class="row">
        <div class="mb-3 col">
        <label for="kepala keluarga" class="form-label">Nama Kepala Keluarga</label>
        <input type="text" class="form-control" id="kepala keluarga" placeholder="Masukkan nama kepala keluarga" >
        <div class="mb-3 col>">
        <label for="dusun" class="form-label">Dusun</label>
            <select class="form-select" aria-label="Default select example" id="dusun">
            <option selected>pilih dusun</option>
            <option value="1">One</option>
            <option value="2">Two</option>
            <option value="3">Three</option>
            </select>
        </div>
        </div>
        </div>
        <div class="row">
            <div class="mb-3 col">
                <label for="alamat" class="form-label">Alamat</label>
                <input type="text" class="form-control" id="alamat" placeholder="Masukkan alamat" >
            </div>
            <div class="mb-3 col">
                <label for="rt" class="form-label">RT/RW</label>
                <input type="text" class="form-control" id="rt" placeholder="Masukkan RT" >
            </div>
        </div>
        <div class="mb-3">
            <label for="agama" class="form-label">Agama</label>
            <input type="text" class="form-control" id="agama" placeholder="Masukkan agama" >
        </div>
        <div class="mb-3">
            <label for="foto" class="form-file">Foto KK</label>
            <input type="file" class="form-control" id="foto" placeholder="Masukkan foto" accept="image/jpg,image/jpeg,image/png" >
        </div>
        </div>
        <div class="d-flex justify-content-end">
        <button type="button" class="btn btn-kirim ">Kirim</button>
        </div>
        </div>
        </div>
        </form>
        </div>
        </div>
        </div>
        {% endblock %}
