{% extends 'Dashboard_dusun.html' %}
{% block content %}
        <div class="d-flex align-items-center justify-content-between mb-4">
        <h2 class="h4 fw-bold mb-0" style="color: var(--primary-color);">Tambah KK <i class="bi bi-plus-lg"></i></h2>
        <div class="d-flex align-items-center gap-4">
        </div>
    </div>
    <div class="d-flex justify-content-center">
    <div class="card-modern card mb-4" style="padding: 20px; width:80vh; height:auto;" >
        <div class="card-body" style="width:100%">
        <form style="color: var(--primary-color); font-size:large; font-weight:bold" action="{{url_for('tambah_kk')}}" method="POST">
        <div class="mb-3">
        <label for="kk" class="form-label">Nomor Kartu Keluarga</label>
        <input type="text" class="form-control" id="kk" name="no_kk" placeholder="Masukkan nomor kartu keluarga" required >
        </div>
        <div class="mb-3">
        <label for="kepala keluarga" class="form-label">Nama Kepala Keluarga</label>
        <input type="text" class="form-control" id="kepala keluarga" name="nama" placeholder="Masukkan nama kepala keluarga" required>
        <div class="mb-3">
        <label for="dusun" class="form-label">Dusun</label>
            <select class="form-select" aria-label="Default select example" id="dusun" name="dusun" aria-readonly="true" required>
            <option selected value="{{dusun.id}}">{{ dusun.nama if dusun else 'Pilih Dusun' }}</option>
            </select>
        </div>
        </div>
            <div class="mb-3 ">
                <label for="alamat" class="form-label">Alamat</label>
                <input type="text" class="form-control" id="alamat" name="alamat" placeholder="Masukkan alamat" required>
            </div>
        <div class="d-flex justify-content-end mb-3">
        <button type="submit" class="btn btn-kirim "><i class="bi bi-send" ></i>   Kirim</button>
        </div>
        </form >
        <div class="d-flex justify-content-end">
            <form action="{{url_for('ocr_page_kk')}}" method="POST" enctype="multipart/form-data">
        <label class="btn btn-kirim d-flex justify-content-center" style="padding: 3px; height:4vh; align-items:center;">
            <input type="file" style="display: none;" name="file" onchange="this.form.submit()" accept="image/jpg,image/jpeg,image/png">
              <i class="bi bi-upc-scan" >   </i>    scan KK
        </label>
        </form>
        </div>
        </div>
        </div>
        </div>
        </div>
        {% endblock %}
