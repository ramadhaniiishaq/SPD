{% extends 'Dashboard_desa.html' %}
{% block content %}
            <h2 class="h4 fw-bold mb-3" style="color: var(--primary-color);">KK</h2>
            <div class="g-3 mb-4">
                <div class="col-md-">
                    <div class="card-modern card p-5">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <span class="text-muted small">Pengunjung</span>
                                <h3 class="fw-bold mb-0">{{kk}}</h3>
                            </div>
                            <i class="bi bi-people fs-1 text-primary opacity-50"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="d-flex align-items-center justify-content-between mb-2">
                <h3 class="h5 fw-bold mb-3">Data KK</h3>
                <div class="d-flex align-items-center gap-4">
                    <div class="d-flex align-items-center position-relative">
                        <i class="bi bi-search position-absolute" style="left: 10px; color: #6c757d;"></i>
                        <input type="text" class="form-control ps-5" onkeyup="fungsicari()" id="cari" placeholder="Cari nama..."
                            style="width: 200px; border-radius: 8px; height: 38px;">
                    </div>
                    <div class="d-flex align-items-center position-relative">
                        <i class="bi bi-search position-absolute" style="left: 10px; color: #6c757d;"></i>
                        <input type="text" class="form-control ps-5" onkeyup="fungsicari1()" id="cari1" placeholder="Cari dusun..."
                            style="width: 200px; border-radius: 8px; height: 38px;">
                    </div>

                </div>
            </div>
            <div class="card-modern card mb-4">
                <div class="card-body table-responsive">
                    <table class="table table-striped" id="tabelkk">
                        <thead>
                            <tr>
                                <th >No</th>
                                <th >No kk</th>
                                <th >kepala keluarga</th>
                                <th >alamat</th>
                                <th >dusun</th>
                                <th >aksi</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for kk in kk2 %}
                            <tr>
                                <th >{{loop.index}}</th>
                                <td>{{kk.no_kk}}</td>
                                <td>{{kk.kepala_keluarga}}</td>
                                <td>{{kk.alamat}}</td>
                                <td>{{kk.nama}}</td>
                                <td>
                                <a type="btn" class="btn btn-detail" href="{{url_for('penduduk', id_kk=kk.id)}}">lihat</a></td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>


{% endblock %}
{% block js %}
<script>
function fungsicari() {
    let input = document.getElementById("cari");
    let filter = input.value.toUpperCase();
    let table = document.getElementById("tabelkk");
    let tr = table.getElementsByTagName("tr");

    for (let i = 1; i < tr.length; i++) {

        let td = tr[i].getElementsByTagName("td")[1];

        if (td) {
            let txtValue = td.textContent || td.innerText;

            if (txtValue.toUpperCase().includes(filter)) {
                tr[i].style.display = "";
            } else {
                tr[i].style.display = "none";
            }
        }
    }
}
function fungsicari1() {
    let input = document.getElementById("cari1");
    let filter = input.value.toUpperCase();
    let table = document.getElementById("tabelkk");
    let tr = table.getElementsByTagName("tr");

    for (let i = 1; i < tr.length; i++) {

        let td = tr[i].getElementsByTagName("td")[3];

        if (td) {
            let txtValue = td.textContent || td.innerText;

            if (txtValue.toUpperCase().includes(filter)) {
                tr[i].style.display = "";
            } else {
                tr[i].style.display = "none";
            }
        }
    }
}
</script> 

{% endblock %}
