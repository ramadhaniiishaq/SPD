{% extends 'Dashboard_desa.html'%}
{% block content %}
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="h4 fw-semibold mb-1">Beranda</h2>
                </div>
                <br>

                <span class="text-muted small">
                    <i class="bi bi-calendar3"></i>
                    <script>document.write(new Date().toLocaleDateString('id-ID'));</script>
                </span>
            </div>
            <div class="main g-3 mb-4" style="animation: fadeInUp 1s ease-out forwards;">
                <div class="p-3">
                    <h2 class="text-muted small mb-0 " style="padding:10px; color:var(--text-color);" >Selamat datang !!</h2>
                </div>
            </div>
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card-modern card p-5">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <span class="text-muted small">Dusun</span>
                                <h3 class="fw-bold mb-0">{{dusun}}</h3>
                            </div>
                            <i class="bi bi-house-door fs-1 text-primary opacity-50"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card-modern card p-5">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <span class="text-muted small">Penduduk</span>
                                <h3 class="fw-bold mb-0">{{jp}}</h3>
                            </div>
                            <i class="bi bi-people fs-1 text-success opacity-50"></i>
                        </div>
                    </div>
                </div>
            </div>
            {% endblock %}
